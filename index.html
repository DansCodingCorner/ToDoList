<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href ="styles/styles.css">
</head>
<body>
    <main>
        <!-- <script type = "module" src = "/scripts/Modules/TaskManager.js"></script> -->
        <!-- <script type = "module" src = "/scripts/Modules/Task.js"></script> -->

        <h1>Your To Do list</h1>
        <div id = "tasks">
            <div id ="Monday"></div>
            <div id ="Tuesday"></div>
            <div id = "Wednesday"></div>
            <div id = "Thursday"></div>
            <div id = "Friday"></div>
            <div id = "Saturday"></div>
            <div id ="Sunday"></div>
        </div>
        <div id = "buttons_container">
            <button id = "Add_tasks_button">Add Tasks</button>  
            <button id = "Remove_TaskButton">Remove Task</button>
            <Button id = "Edit_TaskButton">Edit Task</Button>
            <button id = "Clear_tasks_button">Clear Tasks</button>
        </div>
    <dialog id="AddTaskDialog">
        <h2>Create a new task!</h2>
        <label for="TaskNameInput">Task Name</label><br>
        <input type="text" id="TaskNameInput" name="TaskNameInput"><br>
        
        <label for="TaskDescInput">Task Description</label><br>
        <input type="text" id="TaskDescInput" name="TaskDescInput"><br>

        <label for="DueDate">Date:</label>
        <input type="date" id="DueDate" name="DueDate"><br>

        <select name="TaskPriority" id="TaskPriority">
            <option value="1">Low</option>
            <option value="2">Medium</option>
            <option value="3">High</option>
        </select><br>

        <button id = "confirmAddTaskButton">Confirm</button>
        <button id="closeDialogButton">Close</button>
    </dialog>
    
    <script type ="module" src = "scripts/main.js"></script>

    </main>

</body>
</html>
