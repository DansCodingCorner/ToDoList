<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href ="styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <main>

        <h1>To do</h1>

        <div id = "tasks">
            <div id ="Monday">Monday</div>
            <div id ="Tuesday">Tuesday</div>
            <div id = "Wednesday">Wednesday</div>
            <div id = "Thursday">Thursday</div>
            <div id = "Friday">Friday</div>
            <div id = "Saturday">Saturday</div>
            <div id ="Sunday">Sunday</div>
        </div>
        <div id = "buttons_container">
            <button id = "Add_tasks_button">Add Tasks</button>  
            <button id = "Remove_TaskButton">Remove Task</button>
        </div>
    <dialog id="AddTaskDialog">

        <h2>Create a new task!</h2>

        <label for="TaskNameInput">Task Name</label><br>
        <input type="text" id="TaskNameInput" name="TaskNameInput"><br>
        
        <label for="TaskDescInput">Task Description</label><br>
        <input type="text" id="TaskDescInput" name="TaskDescInput"><br>

        <select name="DueDate" id="DueDate">
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesdays</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
            <option value="Saturday">Saturday</option>
            <option value="Sunday">Sunday</option>
        </select><br>

        <select name="TaskPriority" id="TaskPriority">
            <option value="1">Low</option>
            <option value="2">Medium</option>
            <option value="3">High</option>
        </select><br>

        <button id = "confirmAddTaskButton">Confirm</button>
        <button id="closeDialogButton">Close</button>

    </dialog>

    <dialog id ="removeTaskDialog">

        <h2>Are you sure?</h2>
        <p>Selecting confirm will delete all selected tasks</p>

        <button id = "confirmDeleteTasksButton">Confirm</button>
        <button id="closeRemoveDialogButton">Close</button>

    </dialog>

    <script type ="module" src = "scripts/main.js"></script>

    </main>

</body>
</html>
